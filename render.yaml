services:
  # 1. Backend API Service
  - type: web
    name: gitaverse-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend:app --host 0.0.0.0 --port $PORT
    plan: free
    
  # 2. Frontend Static Site
  - type: web
    name: gitaverse-frontend
    env: static
    rootDir: frontend
    buildCommand: "" # No build step required for static HTML
    staticPublishPath: ./DASHBOARD
